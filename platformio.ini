; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Common settings for all environments
[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47
    bblanchon/ArduinoJson@^7.0.0
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
base_build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_SPIRAM_SUPPORT=1
    -DARDUINO_LOOP_STACK_SIZE=32768

; Production build - real data
[env:production]
extends = common
build_flags =
    ${common.base_build_flags}

; Demo: No arrivals
[env:demo-no-arrivals]
extends = common
build_flags =
    ${common.base_build_flags}
    -DDEMO_MODE=1

; Demo: Arrival in 1 hour
[env:demo-1hr]
extends = common
build_flags =
    ${common.base_build_flags}
    -DDEMO_MODE=2

; Demo: Arrival in 5 min
[env:demo-5min]
extends = common
build_flags =
    ${common.base_build_flags}
    -DDEMO_MODE=3

; Demo: No WiFi error
[env:demo-no-wifi]
extends = common
build_flags =
    ${common.base_build_flags}
    -DDEMO_MODE=4

; Demo: Last bus of the day
[env:demo-last-bus]
extends = common
build_flags =
    ${common.base_build_flags}
    -DDEMO_MODE=5

; Demo: Font test
[env:demo-font-test]
extends = common
build_flags =
    ${common.base_build_flags}
    -DDEMO_MODE=6

; Demo: GTFS timing test
[env:demo-gtfs-timing]
extends = common
build_flags =
    ${common.base_build_flags}
    -DDEMO_MODE=7

; Demo: Memory benchmark
[env:demo-benchmark]
extends = common
build_flags =
    ${common.base_build_flags}
    -DDEMO_MODE=8
